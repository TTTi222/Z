        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--paper);
        box-shadow: 0 26px 80px rgba(127, 44, 70, 0.2);
        backdrop-filter: blur(18px);
        position: relative;
      }

      .letter::before,
      .letter::after {
        content: "";
        position: absolute;
        width: 74px;
        height: 74px;
        border: 1px solid rgba(180, 77, 104, 0.22);
        pointer-events: none;
      }

      .letter::before {
        top: 18px;
        left: 18px;
        border-right: 0;
        border-bottom: 0;
      }

      .letter::after {
        right: 18px;
        bottom: 18px;
        border-left: 0;
        border-top: 0;
      }

      .name {
        margin: 0 0 18px;
        font-size: clamp(42px, 11vw, 92px);
        line-height: 0.96;
        font-weight: 700;
        letter-spacing: 0;
        color: var(--deep);
      }

      .question {
        margin: 0;
        font-size: clamp(22px, 5.4vw, 42px);
        line-height: 1.4;
        font-weight: 500;
      }

      .soft-line {
        width: 118px;
        height: 1px;
        margin: 30px 0;
        background: linear-gradient(90deg, var(--rose), rgba(180, 77, 104, 0));
      }

      .note {
        margin: 0;
        max-width: min(36em, calc(100% - 150px));
        color: rgba(61, 38, 48, 0.74);
        font-size: clamp(15px, 3.2vw, 18px);
        line-height: 1.9;
      }

      .seal {
        position: absolute;
        right: clamp(24px, 6vw, 54px);
        bottom: clamp(24px, 6vw, 46px);
        width: clamp(62px, 15vw, 96px);
        aspect-ratio: 1;
        display: grid;
        place-items: center;
        border-radius: 50%;
        border: 1px solid rgba(180, 77, 104, 0.32);
        color: var(--rose);
        font-size: clamp(24px, 6vw, 40px);
        background: rgba(255, 255, 255, 0.38);
      }

      @media (max-width: 560px) {
        main {
          place-items: end center;
          padding-bottom: 28px;
        }

        .letter {
          padding-bottom: 116px;
        }

        .note {
          max-width: 100%;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <section class="letter" aria-label="给乔薇薇的留言">
        <h1 class="name">乔薇薇</h1>
        <p class="question">在干嘛呢？<br />怎么把微信名都改了？</p>
        <div class="soft-line" aria-hidden="true"></div>
        <p class="note">晚风把想念吹得很轻，屏幕这边的人却看得很认真。</p>
        <div class="seal" aria-hidden="true">♡</div>
      </section>
    </main>
  </body>
</html>
